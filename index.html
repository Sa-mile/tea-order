<label>Выберите или введите клиента:</label>
<input list="clients-list" id="client" placeholder="Начните вводить название...">
<datalist id="clients-list">
    </datalist>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // ПОЛУЧАЕМ СПИСОК КЛИЕНТОВ ИЗ ПАРАМЕТРОВ ССЫЛКИ
    const urlParams = new URLSearchParams(window.location.search);
    const clientsData = urlParams.get('clients'); 
    
    if (clientsData) {
        const clients = JSON.parse(decodeURIComponent(clientsData));
        const list = document.getElementById('clients-list');
        clients.forEach(name => {
            let option = document.createElement('option');
            option.value = name;
            list.appendChild(option);
        });
    }

    document.getElementById("main_button").onclick = function() {
        let client = document.getElementById("client").value;
        let count = document.getElementById("count").value;

        if (!client || count <= 0) {
            alert("Заполните данные!");
            return;
        }

        tg.sendData(JSON.stringify({ client: client, count: count }));
        tg.close();
    };
</script>
