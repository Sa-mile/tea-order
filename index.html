<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
        }
        .container { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; font-size: 14px; }
        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 16px;
        }
        button {
            padding: 15px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Новый заказ ☕</h2>
        
        <label>Выберите клиента:</label>
        <input type="text" id="client" placeholder="Введите название кофейни...">

        <label>Количество позиций (шт):</label>
        <input type="number" id="count" placeholder="Например: 5" min="1">

        <button id="main_button">Оформить заказ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на всё окно

        let btn = document.getElementById("main_button");

        btn.addEventListener("click", function() {
            let client = document.getElementById("client").value;
            let count = document.getElementById("count").value;

            if (client.length < 2) {
                alert("Введите имя клиента");
                return;
            }
            if (count <= 0) {
                alert("Укажите количество");
                return;
            }

            // Формируем данные для отправки в Python
            let data = {
                client: client,
                count: count
            };

            tg.sendData(JSON.stringify(data)); // Отправляем JSON боту
        });
    </script>
</body>
</html>
