<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .box { display: flex; flex-direction: column; gap: 10px; }
        input, button, select { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Оформление заказа ☕</h3>
        
        <label>Клиент:</label>
        <input list="clients-list" id="client" placeholder="Начните вводить...">
        <datalist id="clients-list"></datalist>

        <label>Товар:</label>
        <select id="product">
            <option value="Ягодный чай 0.5">Ягодный чай 0.5</option>
            <option value="Концентрат Малина">Концентрат Малина</option>
            <option value="Концентрат Облепиха">Концентрат Облепиха</option>
        </select>

        <label>Количество (шт):</label>
        <input type="number" id="count" value="1" min="1">

        <button id="send_btn">Подтвердить и отправить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Читаем список клиентов из ссылки
        const params = new URLSearchParams(window.location.search);
        const dataStr = params.get('clients');
        if (dataStr) {
            const clients = JSON.parse(decodeURIComponent(dataStr));
            const list = document.getElementById('clients-list');
            clients.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c;
                list.appendChild(opt);
            });
        }

        // 2. Логика кнопки
        document.getElementById("send_btn").onclick = function() {
            let client = document.getElementById("client").value;
            let product = document.getElementById("product").value;
            let count = document.getElementById("count").value;

            if (!client) return alert("Выберите клиента!");

            tg.sendData(JSON.stringify({
                client: client,
                product: product,
                count: count
            }));
            tg.close();
        };
    </script>
</body>
</html>
